<form (ngSubmit)="onSubmit(registerForm)" #registerForm="ngForm">
  <div>
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" name="fullName" ngModel required>
    <div *ngIf="registerForm.submitted && registerForm.controls['fullName']?.errors?.['required']" class="error">
      Full Name is required.
    </div>
  </div>
  <div>
    <label for="userEmail">Email</label>
    <input type="email" id="userEmail" name="userEmail" ngModel required>
    <div *ngIf="registerForm.submitted && registerForm.controls['userEmail']?.errors?.['required']" class="error">
      Email is required.
    </div>
    <div *ngIf="registerForm.submitted && registerForm.controls['userEmail']?.errors?.['email']" class="error">
      Email must be a valid email address.
    </div>
  </div>
  <div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" ngModel required>
    <div *ngIf="registerForm.submitted && registerForm.controls['password']?.errors?.['required']" class="error">
      Password is required.
    </div>
  </div>
  <div>
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" name="confirmPassword" ngModel required>
    <div *ngIf="registerForm.submitted && registerForm.controls['confirmPassword']?.errors?.['required']" class="error">
      Confirm Password is required.
    </div>
  </div>
  <button type="submit">Register</button>
  <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
</form>
